name: Bug report
description: Something in the CLI, dashboard, plugin, or detection engine is broken.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: >-
        Thanks for the report! **Do not paste real secrets, tokens, or personal data** —
        redact any sensitive values in logs and samples. Security vulnerabilities go
        through [private vulnerability reporting](https://github.com/akasecurity/ai-tc/security/advisories/new)
        instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `aka init`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `aka --version` (or the plugin version from `/plugin` in Claude Code).
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + Node.js version (`node --version`).
      placeholder: macOS 15 / Node 26.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Redact anything sensitive. This is rendered as a code block automatically.
      render: shell
