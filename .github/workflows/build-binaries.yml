name: Build binaries

# Builds the self-contained `aka` Single Executable Application for each supported
# OS/arch and uploads it as a workflow artifact. No publishing here — the release
# workflow (later PR) attaches these to a GitHub Release. SEA has no cross-compilation,
# so each target builds on its own runner.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'cli/**'
      - 'web-ui/**'
      - 'packages/**'
      - '.github/workflows/build-binaries.yml'

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: darwin-arm64 }
          - { os: ubuntu-24.04, target: linux-x64 }
          - { os: ubuntu-24.04-arm, target: linux-arm64 }
          - { os: windows-2022, target: win32-x64 }
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.30.1
      - uses: actions/setup-node@v6
        with:
          # The SEA embeds whichever Node packages it, so pin the shipped runtime to
          # the repo's Active LTS (matches .nvmrc) rather than Current — the artifact
          # must not depend on who built it.
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the ESM bundle, the standalone web-ui sidecar, then package + self-verify
      # the binary (package:sea runs the binary's `--version` and fails if it can't boot).
      - run: pnpm --filter @akasecurity/cli build:sea
      - run: pnpm --filter @akasecurity/cli bundle:web-ui
      - run: pnpm --filter @akasecurity/cli package:sea
      # Exercise the packaged binary against a real SQLite store: `init` + `stats` prove
      # the store read/write path that `package:sea`'s `--version` self-check never touches.
      - run: pnpm --filter @akasecurity/cli smoke:sea
      # Boot the packaged binary's dashboard in-process and assert it serves HTTP 200 —
      # covers the Next standalone server.js import path that `--version` never exercises.
      - run: pnpm --filter @akasecurity/cli smoke:dashboard
      # Prove the archive layout on every target — this is the only place the Windows
      # Compress-Archive zip path is exercised before a real release depends on it.
      # archive:sea emits aka-<version>-<triple>.(tar.gz|zip); extract it and confirm it
      # roots at aka-<triple>/ with the binary inside. Nothing is published here.
      - run: pnpm --filter @akasecurity/cli archive:sea
      - name: Verify archive layout (unix)
        if: runner.os != 'Windows'
        working-directory: cli/sea-dist
        run: |
          mkdir -p _roundtrip
          tar -xzf aka-*-${{ matrix.target }}.tar.gz -C _roundtrip
          test -f "_roundtrip/aka-${{ matrix.target }}/aka" \
            || { echo "::error::archive did not root at aka-${{ matrix.target }}/aka"; exit 1; }
      - name: Verify archive layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: cli/sea-dist
        run: |
          $zip = Get-ChildItem "aka-*-${{ matrix.target }}.zip" | Select-Object -First 1
          New-Item -ItemType Directory -Force _roundtrip | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath _roundtrip -Force
          if (-not (Test-Path "_roundtrip/aka-${{ matrix.target }}/aka.exe")) {
            Write-Error "archive did not root at aka-${{ matrix.target }}/aka.exe"
            exit 1
          }
      - uses: actions/upload-artifact@v7
        with:
          name: aka-${{ matrix.target }}
          path: cli/sea-dist/aka-${{ matrix.target }}/
          if-no-files-found: error
