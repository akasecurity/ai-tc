name: Docs

# Builds the MkDocs site in --strict mode (warnings fail the build). Split out of
# the main CI workflow and path-filtered so the Python + mkdocs toolchain only runs
# on PRs that actually touch the docs — non-docs PRs skip it entirely, saving the
# pip install + mkdocs build minutes. The docs build needs no Node/pnpm: it is just
# `mkdocs build --strict` over docs.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build docs (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies (mkdocs)
        # `python -m pip` (not bare `pip`) targets the interpreter set up above,
        # not the runner's system Python — keeps installs and the pip cache aligned.
        run: python -m pip install -r docs/requirements.txt

      - name: Build docs (strict)
        run: python -m mkdocs build --strict
        working-directory: docs
