# The detection rule packs ship intentionally-fake provider secrets as rule
# definitions and test fixtures — that content IS the product. Exclude those
# paths so GitHub secret-scanning alerts don't fire on our own detection data.
# (Verified inert: trufflehog reports 0 of them as live credentials.)
#
# Note: paths-ignore suppresses secret-scanning ALERTS. Push protection may still
# flag a push that adds/edits one of these files; that case is handled by the
# admin push-protection bypass.
paths-ignore:
  - 'rules/secrets/**'
  - 'rules/secrets-infra/**'
  - 'rules/**/fixtures/**'
